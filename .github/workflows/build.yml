name: Build HWP Merger App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 PyInstaller

      - name: PyInstaller로 exe 빌드
        run: |
          pyinstaller --onefile --windowed --name "HWP합치기" hwp_merger.py

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: hwp-merger-windows
          path: dist/HWP합치기.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 PyInstaller

      - name: PyInstaller로 앱 빌드
        run: |
          pyinstaller --onefile --windowed --name "HWP합치기" hwp_merger.py

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: hwp-merger-macos
          path: dist/HWP합치기
          retention-days: 30

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Windows 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: hwp-merger-windows
          path: ./artifacts/windows

      - name: macOS 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: hwp-merger-macos
          path: ./artifacts/macos

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/windows/HWP합치기.exe
            ./artifacts/macos/HWP합치기
          generate_release_notes: true
